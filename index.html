<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AJ Movies – Cinema by AJ</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --a:#d6a84f;--a2:#f5d47b;--aglow:rgba(214,168,79,.2);
  --dark:#030303;--dark2:#090806;--dark3:#12100b;--dark4:#1a160d;
  --card:#0c0b08;--card2:#151109;
  --text:#f7f0df;--text2:#c5b893;--muted:#72684f;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.12);
  --gold:#f5c76b;--red:#e74c3c;
  --r:14px;--r2:10px;
}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}
body.cine-layout{background:#000}
button,a{cursor:pointer;font-family:'Outfit',sans-serif}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(0,212,170,.4);border-radius:2px}
::-webkit-scrollbar-track{background:transparent}

/* ══ SPLASH ══ */
#splash{position:fixed;inset:0;z-index:99999;background:var(--dark);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;transition:opacity .7s ease,visibility .7s}
#splash.out{opacity:0;visibility:hidden}
.spl-logo{font-size:72px;font-weight:900;letter-spacing:-3px;color:#fff;line-height:1}
.spl-logo span{color:var(--a)}
.spl-sub{font-size:11px;letter-spacing:7px;color:var(--muted);text-transform:uppercase;margin-top:4px}
.spl-bar{width:100px;height:2px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-top:28px}
.spl-fill{height:100%;background:linear-gradient(90deg,var(--a),var(--a2));animation:fill 2s ease both}
@keyframes fill{from{width:0}to{width:100%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══ NAV ══ */
#nav{position:fixed;top:30px;left:50%;transform:translateX(-50%);z-index:500;height:70px;display:flex;align-items:center;justify-content:center;gap:18px;padding:8px 12px 8px 18px;transition:background .3s,backdrop-filter .3s,border-color .3s,top .3s;border:1px solid rgba(255,255,255,.1);border-radius:36px;background:rgba(18,18,24,.78);box-shadow:0 24px 80px rgba(0,0,0,.45);backdrop-filter:blur(26px);-webkit-backdrop-filter:blur(26px)}
#nav.solid{top:14px;background:rgba(18,18,24,.9);border-color:rgba(255,255,255,.14)}
.nav-logo{font-size:20px;font-weight:900;letter-spacing:-1px;display:flex;align-items:center;gap:2px}
.nav-logo span{color:var(--a)}
.nav-links{display:flex;align-items:center;gap:4px}
.nl{color:#c5c4ce;font-size:16px;font-weight:700;padding:12px 17px;border-radius:28px;transition:.2s;cursor:pointer;letter-spacing:.1px;white-space:nowrap}
.nl:hover{color:#fff;background:rgba(255,255,255,.08)}
.nl.on{color:#000!important;background:#fff;font-weight:900}
.nav-right{display:flex;align-items:center;gap:10px}
.srch-wrap{position:relative}
.srch-ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
#nsearch{background:rgba(255,255,255,.08);border:1px solid transparent;border-radius:50px;padding:12px 16px 12px 38px;color:var(--text);font-size:13px;width:54px;outline:none;font-family:'Outfit',sans-serif;transition:.3s}
#nsearch:focus{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.15);width:220px;box-shadow:none}
#nsearch::placeholder{color:var(--muted)}
.nav-wl{background:rgba(255,255,255,.08);border:1px solid transparent;color:#f5f5f5;padding:12px 15px;border-radius:50px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;transition:.2s}
.nav-wl:hover{background:rgba(255,255,255,.14)}
.wl-badge{background:var(--a);color:#000;border-radius:50%;width:18px;height:18px;font-size:10px;display:inline-flex;align-items:center;justify-content:center;font-weight:900}
.mob-btn{display:none;background:rgba(255,255,255,.07);border:1px solid var(--border);color:#fff;padding:7px 12px;border-radius:10px;font-size:17px;line-height:1}
.mob-drawer{display:none;position:fixed;top:62px;left:0;right:0;background:rgba(8,8,16,.98);backdrop-filter:blur(24px);z-index:499;border-bottom:1px solid var(--border);padding:8px 0}
.mob-drawer.open{display:block}
.mob-item{display:block;padding:13px 24px;font-size:15px;font-weight:600;color:var(--text2);cursor:pointer;transition:.2s}
.mob-item:hover{background:rgba(255,255,255,.05);color:#fff}

/* ══ APP ══ */
#app{padding-top:0}
.page{display:none}
.page.on{display:block;animation:fadeUp .32s cubic-bezier(.23,1,.32,1)}

/* ══ HERO ══ */
.hero{position:relative;height:78vh;min-height:540px;max-height:760px;overflow:hidden;display:flex;align-items:flex-end;background:#000}
.hero-bg{position:absolute;inset:-6%;background-size:cover;background-position:center 22%;transition:background-image .8s;will-change:transform}
.h-vig{position:absolute;inset:0;background:radial-gradient(ellipse at 65% 35%,transparent 20%,rgba(8,8,16,.6) 80%)}
.h-g1{position:absolute;inset:0;background:linear-gradient(110deg,rgba(8,8,16,.97) 30%,rgba(8,8,16,.5) 62%,transparent)}
.h-g2{position:absolute;bottom:0;left:0;right:0;height:400px;background:linear-gradient(to top,var(--dark),transparent)}
.h-g3{position:absolute;top:0;left:0;right:0;height:180px;background:linear-gradient(to bottom,rgba(8,8,16,.5),transparent)}
.hero-body{position:relative;z-index:2;padding:0 72px 68px;max-width:680px}
.tag-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.tag{padding:4px 11px;border-radius:6px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px}
.t-hd{background:var(--a);color:#000}
.t-type{background:rgba(255,255,255,.1);color:var(--text2);border:1px solid rgba(255,255,255,.14)}
.t-sc{background:rgba(249,199,79,.12);color:var(--gold);border:1px solid rgba(249,199,79,.22)}
.hero-ttl{font-size:56px;font-weight:900;line-height:1.04;letter-spacing:-2px;margin-bottom:12px;color:#fff;text-shadow:0 2px 30px rgba(0,0,0,.5)}
.hero-meta{display:flex;align-items:center;gap:12px;margin-bottom:13px;flex-wrap:wrap}
.hero-meta span{font-size:13px;color:var(--text2)}
.hdot{width:3px;height:3px;border-radius:50%;background:var(--muted)}
.hsc{color:var(--gold);font-weight:800;font-size:15px}
.hero-ov{color:rgba(240,239,248,.5);font-size:14px;line-height:1.78;margin-bottom:28px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;max-width:520px}
.hero-btns{display:flex;gap:11px;flex-wrap:wrap}
.h-dots{position:absolute;bottom:32px;right:72px;display:flex;gap:6px;z-index:3;align-items:center}
.h-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.22);cursor:pointer;transition:.35s}
.h-dot.on{background:var(--a);width:26px;border-radius:3px;box-shadow:0 0 10px var(--a)}

/* BUTTONS */
.btn-p{background:linear-gradient(135deg,var(--a),var(--a2));color:#000;border:none;padding:13px 28px;border-radius:13px;font-size:14px;font-weight:800;display:inline-flex;align-items:center;gap:9px;transition:.25s;box-shadow:0 6px 24px var(--aglow)}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(0,212,170,.4)}
.btn-s{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15);padding:13px 22px;border-radius:13px;font-size:14px;font-weight:700;display:inline-flex;align-items:center;gap:8px;transition:.2s;backdrop-filter:blur(10px)}
.btn-s:hover{background:rgba(255,255,255,.17)}
.btn-ic{background:rgba(255,255,255,.08);color:var(--muted);border:1px solid var(--border);padding:13px 14px;border-radius:13px;font-size:18px;line-height:1;transition:.25s}
.btn-ic:hover{color:var(--gold);border-color:rgba(249,199,79,.3);background:rgba(249,199,79,.06)}
.btn-ic.sv{color:var(--gold);border-color:rgba(249,199,79,.3);background:rgba(249,199,79,.06)}
